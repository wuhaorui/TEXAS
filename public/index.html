<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>德州扑克 - 多人在线</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --felt-green: #0d5c2e;
            --felt-dark: #0a4a24;
            --rail-wood: #5c3d2e;
            --rail-dark: #3d2820;
            --gold-accent: #d4af37;
            --card-white: #f8f6f0;
            --card-back: #1a3a5c;
            --text-light: #e8e4dc;
            --text-gold: #ffd700;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text-light);
        }

        .screen { display: none; min-height: 100vh; padding: 20px; }
        .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        .lobby-container { text-align: center; max-width: 500px; width: 100%; }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--text-gold);
            text-shadow: 0 4px 20px rgba(212, 175, 55, 0.4);
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        .subtitle { font-size: 1.2rem; color: rgba(255, 255, 255, 0.7); margin-bottom: 40px; letter-spacing: 2px; }

        .menu-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 35px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 25px;
        }

        .menu-title { font-size: 1.3rem; margin-bottom: 25px; color: var(--text-light); }

        .player-name-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            margin-bottom: 20px;
            text-align: center;
            transition: all 0.3s;
        }

        .player-name-input:focus { outline: none; border-color: var(--gold-accent); box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        .player-name-input::placeholder { color: rgba(255, 255, 255, 0.5); }

        .chip-options { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; }

        .chip-option {
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .chip-option.chip-1000 { background: linear-gradient(145deg, #e74c3c, #c0392b); color: white; }
        .chip-option.chip-2000 { background: linear-gradient(145deg, #3498db, #2980b9); color: white; }
        .chip-option.chip-5000 { background: linear-gradient(145deg, #9b59b6, #8e44ad); color: white; }
        .chip-option:hover { transform: scale(1.05); }
        .chip-option.selected { border-color: var(--gold-accent); transform: scale(1.1); }

        .btn {
            width: 100%;
            padding: 16px 30px;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .btn-primary { background: linear-gradient(145deg, var(--gold-accent), #b8962e); color: #1a1a2e; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4); }

        .btn-secondary { background: linear-gradient(145deg, #27ae60, #1e8449); color: white; }
        .btn-secondary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(39, 174, 96, 0.4); }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* 游戏界面 */
        .game-container { width: 100%; max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; padding: 15px; }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .table-info { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--gold-accent); }
        .player-balance { display: flex; align-items: center; gap: 10px; }
        .balance-label { color: rgba(255, 255, 255, 0.7); }
        .balance-amount { font-size: 1.3rem; font-weight: 700; color: var(--text-gold); }

        .game-status {
            text-align: center;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gold-accent);
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .game-table {
            flex: 1;
            background: radial-gradient(ellipse at center, var(--felt-green) 0%, var(--felt-dark) 100%);
            border-radius: 50%;
            border: 15px solid var(--rail-wood);
            box-shadow: 0 0 0 5px var(--rail-dark), 0 20px 60px rgba(0, 0, 0, 0.5),
                        inset 0 0 100px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            min-height: 400px;
            position: relative;
        }

        .table-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            position: relative;
        }

        /* 玩家环形布局 */
        .seats-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }

        .seats-row.top { margin-bottom: 20px; }
        .seats-row.bottom { margin-top: 20px; }

        .seat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            min-width: 110px;
            position: relative;
            transition: all 0.3s;
        }

        .seat.active-turn {
            border-color: var(--gold-accent);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
            transform: scale(1.05);
        }

        .seat.folded { opacity: 0.5; }

        /* 位置标识 */
        .position-badge {
            position: absolute;
            top: -10px;
            left: -10px;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 700;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .position-badge.dealer { background: linear-gradient(145deg, var(--gold-accent), #b8962e); color: #1a1a2e; }
        .position-badge.sb { background: linear-gradient(145deg, #e74c3c, #c0392b); }
        .position-badge.bb { background: linear-gradient(145deg, #3498db, #2980b9); }

        .seat-name { font-weight: 600; font-size: 0.9rem; }
        .seat-chips { font-size: 0.9rem; font-weight: 700; color: var(--text-gold); }
        .seat-cards { display: flex; gap: 3px; min-height: 36px; justify-content: center; }

        /* 小卡片尺寸 */
        .seat-cards .card {
            width: 36px;
            height: 52px;
            font-size: 0.6rem;
        }
        .seat-cards .card-corner { font-size: 0.55rem; }
        .seat-cards .card-corner.top { top: 2px; left: 3px; }
        .seat-cards .card-corner.bottom { bottom: 2px; right: 3px; }
        .seat-cards .card-suit { font-size: 0.6rem; }
        .seat-cards .card-center { font-size: 1rem; }

        /* 公共牌更大 */
        .community-cards .card {
            width: 60px;
            height: 87px;
        }
        .community-cards .card-corner { font-size: 0.8rem; }
        .community-cards .card-corner.top { top: 4px; left: 6px; }
        .community-cards .card-corner.bottom { bottom: 4px; right: 6px; }
        .community-cards .card-suit { font-size: 1rem; }
        .community-cards .card-center { font-size: 1.7rem; }

        .community-area { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .community-label { font-family: 'Cinzel', serif; font-size: 0.85rem; color: rgba(255, 255, 255, 0.6); letter-spacing: 2px; }
        .community-cards { display: flex; gap: 10px; justify-content: center; }

        .pot-area {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 25px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 30px;
            border: 2px solid var(--gold-accent);
        }

        .pot-label { font-size: 0.9rem; color: rgba(255, 255, 255, 0.7); }
        .pot-amount { font-size: 1.4rem; font-weight: 700; color: var(--text-gold); font-family: 'Cinzel', serif; }

        .player-hand-area {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .hand-label { font-family: 'Cinzel', serif; font-size: 0.9rem; color: rgba(255, 255, 255, 0.6); letter-spacing: 2px; }
        .hand-cards { display: flex; gap: 12px; }

        .card {
            width: 55px;
            height: 80px;
            border-radius: 6px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .card.face-down {
            background: linear-gradient(145deg, var(--card-back), #0f2840);
            border: 2px solid #2a5a8c;
        }

        .card.face-down::before {
            content: '♠♥♦♣';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
        }

        .card.red, .card.black { background: linear-gradient(145deg, var(--card-white), #e8e4dc); }

        .card-corner { position: absolute; font-family: 'Cinzel', serif; font-weight: 700; font-size: 0.75rem; line-height: 1; }
        .card-corner.top { top: 4px; left: 6px; }
        .card-corner.bottom { bottom: 4px; right: 6px; transform: rotate(180deg); }
        .card-suit { font-size: 0.9rem; }
        .card.red .card-corner { color: #c41e3a; }
        .card.black .card-corner { color: #1a1a1a; }
        .card-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.5rem; }
        .card.hidden { visibility: hidden; }

        /* 操作区域 */
        .action-area { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 15px; }

        .action-btn {
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Noto Sans SC', sans-serif;
            min-width: 80px;
        }

        .action-btn.fold { background: linear-gradient(145deg, #95a5a6, #7f8c8d); color: white; }
        .action-btn.call { background: linear-gradient(145deg, #3498db, #2980b9); color: white; }
        .action-btn.raise { background: linear-gradient(145deg, #e74c3c, #c0392b); color: white; }
        .action-btn.check { background: linear-gradient(145deg, #27ae60, #1e8449); color: white; }
        .action-btn.all-in { background: linear-gradient(145deg, #9b59b6, #8e44ad); color: white; }
        .action-btn.bet { background: linear-gradient(145deg, #f39c12, #d68910); color: white; }

        .action-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3); }
        .action-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .bet-controls { display: flex; align-items: center; gap: 10px; }

        .bet-input {
            padding: 12px 15px;
            font-size: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            width: 110px;
            text-align: center;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .bet-input:focus { outline: none; border-color: var(--gold-accent); }

        /* 等待区域 */
        .waiting-section { text-align: center; padding: 30px; }

        .waiting-text { font-size: 1.2rem; color: rgba(255, 255, 255, 0.8); margin-bottom: 20px; }

        .room-info-box {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
            display: inline-block;
            min-width: 300px;
        }

        .room-id-display { font-family: 'Cinzel', serif; font-size: 1.3rem; color: var(--text-gold); margin-bottom: 8px; }
        .room-chips-display { font-size: 1rem; color: var(--text-light); margin-bottom: 12px; }

        .share-row { display: flex; gap: 10px; align-items: center; justify-content: center; }

        .share-link-text {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .copy-btn {
            padding: 8px 15px;
            font-size: 0.85rem;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .copy-btn:hover { background: #2980b9; }

        .players-list { margin-top: 20px; text-align: left; display: inline-block; min-width: 250px; }

        .player-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .player-item .name { flex: 1; }
        .player-item .chips { color: var(--text-gold); font-weight: 600; }

        .host-badge {
            background: var(--gold-accent);
            color: #1a1a2e;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-left: 5px;
        }

        /* 自定义对话框 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-box {
            background: linear-gradient(145deg, #1a3a5c, #0d5c2e);
            border: 2px solid var(--gold-accent);
            border-radius: 16px;
            padding: 30px 40px;
            text-align: center;
            min-width: 300px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .modal-title {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            color: var(--text-gold);
            margin-bottom: 15px;
        }

        .modal-message {
            color: var(--text-light);
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .modal-btn {
            padding: 10px 40px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(145deg, var(--gold-accent), #b8941f);
            color: #1a1a2e;
            transition: all 0.3s;
        }

        .modal-btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4); }

        .ready-badge {
            background: #27ae60;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 5px;
        }

        .action-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }

        .ready-btn {
            background: linear-gradient(145deg, #95a5a6, #7f8c8d);
            min-width: 120px;
        }

        .ready-btn.is-ready { background: linear-gradient(145deg, #27ae60, #1e8449); }

        .start-btn { min-width: 200px; }

        .transfer-btn {
            padding: 4px 10px;
            font-size: 0.75rem;
            background: #9b59b6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 8px;
        }

        .transfer-btn:hover { background: #8e44ad; }

        .info-panel { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .info-item .label { color: rgba(255, 255, 255, 0.6); }
        .info-item .value { color: var(--text-gold); font-weight: 600; }

        /* 动画 */
        @keyframes cardDeal {
            0% { transform: translateY(-100px) rotate(-20deg) scale(0.5); opacity: 0; }
            100% { transform: translateY(0) rotate(0) scale(1); opacity: 1; }
        }

        .card.dealing { animation: cardDeal 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @media (max-width: 768px) {
            .logo { font-size: 2rem; }
            .seat { min-width: 90px; padding: 8px 12px; }
            .card { width: 45px; height: 65px; }
            .hand-cards .card { width: 55px; height: 80px; }
            .action-btn { padding: 12px 16px; min-width: 65px; font-size: 0.9rem; }
            .players-top { gap: 10px; flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <!-- 大厅界面 -->
    <div id="lobby-screen" class="screen active">
        <div class="lobby-container">
            <h1 class="logo">TEXAS HOLD'EM</h1>
            <p class="subtitle">多人在线德州扑克</p>

            <div class="menu-card">
                <h2 class="menu-title">创建房间</h2>
                <input type="text" id="player-name" class="player-name-input" placeholder="输入你的昵称" maxlength="12">
                <div class="chip-options" id="create-chip-options">
                    <div class="chip-option" onclick="selectChip(this, 1000)">1,000</div>
                    <div class="chip-option selected" onclick="selectChip(this, 2000)">2,000</div>
                    <div class="chip-option" onclick="selectChip(this, 5000)">5,000</div>
                </div>
                <button class="btn btn-primary" onclick="createRoom()">创建房间</button>
            </div>

            <div class="menu-card">
                <h2 class="menu-title">加入房间</h2>
                <input type="text" id="join-room-id" class="player-name-input" placeholder="输入房间号或粘贴链接" maxlength="50" style="text-transform: uppercase;">
                <input type="text" id="join-player-name" class="player-name-input" placeholder="输入你的昵称" maxlength="12">
                <button class="btn btn-secondary" onclick="joinRoom()">加入</button>
            </div>
        </div>
    </div>

    <!-- 游戏等待界面 -->
    <div id="game-screen" class="screen">
        <div class="game-container">
            <div class="table-header">
                <div class="table-info">♠♥ 德州扑克 ♦♣</div>
                <div class="player-balance">
                    <span class="balance-label">剩余:</span>
                    <span class="balance-amount" id="player-balance">0</span>
                </div>
            </div>

            <!-- 自定义对话框：新对局开始 -->
            <div class="modal-overlay" id="new-hand-modal" style="display:none;">
                <div class="modal-box">
                    <div class="modal-title" id="new-hand-title">🃏 新对局开始！</div>
                    <div class="modal-message" id="new-hand-message"></div>
                    <button class="modal-btn" onclick="closeNewHandModal()">确定</button>
                </div>
            </div>

            <div class="waiting-section" id="waiting-section">
                <div class="room-info-box" id="room-info-box">
                    <div class="room-id-display">房间号: <span id="display-room-id"></span></div>
                    <div class="room-chips-display">初始筹码: <span id="display-room-chips"></span></div>
                    <div class="share-row">
                        <div class="share-link-text" id="display-share-link"></div>
                        <button class="copy-btn" onclick="copyShareLink()">复制</button>
                    </div>
                </div>

                <p class="waiting-text">等待其他玩家加入...</p>
                <div class="players-list" id="game-players-list"></div>

                <div class="action-buttons">
                    <button type="button" class="btn btn-secondary ready-btn" id="ready-btn" onclick="toggleReady()">准备</button>
                    <button type="button" class="btn btn-primary start-btn" id="start-btn" onclick="startGame()" style="display: none;">开始游戏</button>
                </div>
            </div>

            <!-- 游戏区域 -->
            <div id="playing-area" style="display: none;">
                <div class="game-status" id="game-status">等待开始...</div>

                <div class="game-table">
                    <div class="table-layout">
                        <!-- 上方玩家 -->
                        <div class="seats-row top" id="seats-top"></div>

                        <!-- 公共牌区域 -->
                        <div class="community-area">
                            <div class="community-label">公共牌</div>
                            <div class="community-cards" id="community-cards">
                                <div class="card face-down hidden"></div>
                                <div class="card face-down hidden"></div>
                                <div class="card face-down hidden"></div>
                                <div class="card face-down hidden"></div>
                                <div class="card face-down hidden"></div>
                            </div>
                        </div>

                        <!-- 底池 -->
                        <div class="pot-area">
                            <span class="pot-label">底池:</span>
                            <span class="pot-amount" id="pot-amount">0</span>
                        </div>

                        <!-- 下方玩家 -->
                        <div class="seats-row bottom" id="seats-bottom"></div>
                    </div>
                </div>

                <!-- 操作区域 -->
                <div class="player-hand-area" id="player-hand-area">
                    <div class="info-panel">
                        <div class="info-item">
                            <span class="label">当前下注:</span>
                            <span class="value" id="current-bet">0</span>
                        </div>
                        <div class="info-item">
                            <span class="label">需跟注:</span>
                            <span class="value" id="to-call">0</span>
                        </div>
                    </div>

                    <div class="action-area" id="action-area">
                        <button class="action-btn fold" onclick="playerAction('fold')">弃牌</button>
                        <button class="action-btn check" id="check-btn" onclick="playerAction('check')" style="display:none">过牌</button>
                        <button class="action-btn call" id="call-btn" onclick="playerAction('call')" style="display:none">跟注</button>
                        <button class="action-btn bet" id="bet-btn" onclick="playerAction('bet')">下注</button>
                        <div class="bet-controls">
                            <input type="number" class="bet-input" id="bet-amount" min="0" placeholder="金额">
                        </div>
                        <button class="action-btn raise" id="raise-btn" onclick="playerAction('raise')" style="display:none">加注</button>
                        <button class="action-btn all-in" onclick="playerAction('allin')">全下</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // 断线重连后自动恢复房间状态
        socket.on('connect', () => {
            // 如果已经在游戏中（有房间信息），自动重新加入
            if (game.roomId && game.playerName && game.playerId) {
                console.log('[重连] socket 重新连接，正在恢复房间状态...');
                rejoinRoom(game.roomId, game.playerName, game.playerId);
            }
        });

        // 游戏状态
        const game = {
            playerId: null,
            playerName: '',
            roomId: null,
            players: [],
            myChips: 0,
            isHost: false,
            phase: 'waiting',
            currentPlayer: 0
        };

        let selectedChips = 2000;

        // ============ 重新加入逻辑 ============
        function checkRejoin() {
            const savedRoomId = localStorage.getItem('texas_roomId');
            const savedPlayerName = localStorage.getItem('texas_playerName');
            const savedPlayerId = localStorage.getItem('texas_playerId');

            if (savedRoomId && savedPlayerName) {
                // 自动填充表单
                document.getElementById('join-room-id').value = savedRoomId;
                document.getElementById('join-player-name').value = savedPlayerName;

                // 提示用户是否重新加入
                if (confirm(`检测到你之前在房间 ${savedRoomId}，是否以"${savedPlayerName}"的身份重新加入？`)) {
                    rejoinRoom(savedRoomId, savedPlayerName, savedPlayerId);
                    return true;
                }
            }
            return false;
        }

        function rejoinRoom(roomId, playerName, oldPlayerId) {
            socket.emit('rejoinRoom', { roomId, playerName, oldPlayerId }, (response) => {
                if (response.success) {
                    game.playerId = response.playerId;
                    game.playerName = playerName;
                    game.roomId = roomId;
                    game.isHost = response.isHost;

                    document.getElementById('lobby-screen').classList.remove('active');
                    document.getElementById('game-screen').classList.add('active');
                    document.getElementById('waiting-section').style.display = 'block';
                    document.getElementById('playing-area').style.display = 'none';

                    updatePlayersList(response.players);
                    updateStartButton(response.players);

                    if (response.gameInProgress) {
                        // 游戏进行中，直接跳到游戏界面
                        document.getElementById('waiting-section').style.display = 'none';
                        document.getElementById('playing-area').style.display = 'block';
                        // 请求当前游戏状态
                        socket.emit('requestGameState');
                    }
                } else {
                    alert(response.error || '重新加入失败');
                    // 清除本地存储
                    localStorage.removeItem('texas_roomId');
                    localStorage.removeItem('texas_playerName');
                    localStorage.removeItem('texas_playerId');
                }
            });
        }

        function saveRoomInfo(roomId, playerName, playerId) {
            localStorage.setItem('texas_roomId', roomId);
            localStorage.setItem('texas_playerName', playerName);
            localStorage.setItem('texas_playerId', playerId);
        }

        function clearRoomInfo() {
            localStorage.removeItem('texas_roomId');
            localStorage.removeItem('texas_playerName');
            localStorage.removeItem('texas_playerId');
        }

        // ============ 初始化 ============
        const urlParams = new URLSearchParams(window.location.search);
        const roomFromUrl = urlParams.get('room');
        if (roomFromUrl) {
            document.getElementById('join-room-id').value = roomFromUrl;
        }

        // 检查是否可以重新加入
        setTimeout(() => {
            if (!game.roomId) {
                checkRejoin();
            }
        }, 500);

        // ============ 筹码选择 ============
        function selectChip(el, chips) {
            document.querySelectorAll('.chip-option').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
            selectedChips = chips;
        }

        // ============ 创建房间 ============
        function createRoom() {
            const nameInput = document.getElementById('player-name');
            const playerName = nameInput.value.trim() || '玩家' + Math.floor(Math.random() * 1000);

            socket.emit('createRoom', {
                playerName,
                initialChips: selectedChips,
                baseUrl: window.location.origin
            }, (response) => {
                if (response.success) {
                    game.playerId = response.playerId;
                    game.playerName = response.playerName;
                    game.roomId = response.roomId;
                    game.isHost = true;

                    // 保存房间信息到本地
                    saveRoomInfo(response.roomId, response.playerName, response.playerId);

                    // 进入等待界面
                    document.getElementById('lobby-screen').classList.remove('active');
                    document.getElementById('game-screen').classList.add('active');
                    document.getElementById('waiting-section').style.display = 'block';
                    document.getElementById('playing-area').style.display = 'none';

                    // 显示房间信息
                    document.getElementById('display-room-id').textContent = response.roomId;
                    document.getElementById('display-room-chips').textContent = response.initialChips.toLocaleString();
                    document.getElementById('display-share-link').textContent = response.shareUrl;

                    // 更新玩家列表
                    updatePlayersList([{
                        id: game.playerId,
                        name: game.playerName,
                        chips: response.initialChips,
                        isHost: true,
                        ready: false
                    }]);

                    // 更新准备按钮
                    updateReadyButton(false);
                } else {
                    alert(response.error || '创建房间失败');
                }
            });
        }

        // ============ 加入房间 ============
        function joinRoom() {
            const nameInput = document.getElementById('join-player-name');
            const playerName = nameInput.value.trim() || '玩家' + Math.floor(Math.random() * 1000);
            const roomInput = document.getElementById('join-room-id');
            let roomId = roomInput.value.trim().toUpperCase();

            // 解析链接
            try {
                const url = new URL(roomId);
                roomId = new URLSearchParams(url.search).get('room') || roomId;
            } catch (e) {}

            if (!roomId) {
                alert('请输入房间号');
                return;
            }

            socket.emit('joinRoom', { roomId, playerName }, (response) => {
                if (response.success) {
                    game.playerId = response.playerId;
                    game.playerName = playerName;
                    game.roomId = roomId;
                    game.isHost = false;

                    // 保存房间信息到本地
                    saveRoomInfo(roomId, playerName, response.playerId);

                    document.getElementById('lobby-screen').classList.remove('active');
                    document.getElementById('game-screen').classList.add('active');
                    document.getElementById('waiting-section').style.display = 'block';
                    document.getElementById('playing-area').style.display = 'none';
                    document.getElementById('room-info-box').style.display = 'none'; // 加入者看不到房间设置

                    updatePlayersList(response.players);
                    updateReadyButton(false);
                } else {
                    alert(response.error || '加入房间失败');
                }
            });
        }

        // ============ 准备功能 ============
        function toggleReady() {
            socket.emit('playerReady', {}, (response) => {
                if (!response.success) {
                    alert(response.error || '操作失败');
                } else {
                    updateReadyButton(response.ready);
                }
            });
        }

        function updateReadyButton(isReady) {
            const readyBtn = document.getElementById('ready-btn');
            if (readyBtn) {
                if (isReady) {
                    readyBtn.textContent = '已准备';
                    readyBtn.classList.add('is-ready');
                } else {
                    readyBtn.textContent = '准备';
                    readyBtn.classList.remove('is-ready');
                }
            }
        }

        // ============ 开始游戏 ============
        function startGame() {
            if (!game.isHost) {
                alert('只有房主可以开始游戏');
                return;
            }
            socket.emit('startGame', {}, (response) => {
                if (!response.success) {
                    alert(response.error || '开始游戏失败');
                }
            });
        }

        // ============ 下注功能 ============
        function playerAction(action) {
            const data = window.currentGameData || {};
            const input = document.getElementById('bet-amount');
            const amount = parseInt(input.value) || 0;

            console.log('[playerAction]', action, 'socket.connected:', socket.connected, 'socket.id:', socket.id);

            socket.emit('bet', { action, amount }, (response) => {
                console.log('[playerAction] response:', response);
                if (!response.success) {
                    alert(response.error || '操作失败');
                }
            });
        }

        // ============ 复制链接 ============
        function copyShareLink() {
            const link = document.getElementById('display-share-link').textContent;
            navigator.clipboard.writeText(link).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '已复制!';
                setTimeout(() => btn.textContent = '复制', 2000);
            });
        }

        // ============ 更新玩家列表 ============
        function updatePlayersList(players) {
            if (!players) return;
            game.players = players;

            const list = document.getElementById('game-players-list');
            list.innerHTML = players.map(p => `
                <div class="player-item">
                    <span class="name">
                        ${p.name}
                        ${p.isHost ? '<span class="host-badge">房主</span>' : ''}
                        ${p.ready && !p.isHost ? '<span class="ready-badge">已准备</span>' : ''}
                    </span>
                    <span class="chips">${p.chips}</span>
                    ${game.isHost && !p.isHost ? `<button class="transfer-btn" onclick="transferHost('${p.id}')">转让</button>` : ''}
                </div>
            `).join('');

            // 更新开始按钮
            updateStartButton(players);
        }

        function updateStartButton(players) {
            const startBtn = document.getElementById('start-btn');
            if (!game.isHost) {
                startBtn.style.display = 'none';
                return;
            }

            if (players.length >= 2 && players.every(p => p.ready || p.isHost)) {
                startBtn.style.display = 'inline-block';
                startBtn.disabled = false;
            } else {
                startBtn.style.display = 'inline-block';
                startBtn.disabled = true;
            }
        }

        function transferHost(targetPlayerId) {
            if (!confirm('确定要转让房主给这位玩家吗？')) return;
            socket.emit('transferHost', { targetPlayerId }, (response) => {
                if (!response.success) alert(response.error || '转让失败');
            });
        }

        // ============ Socket 事件 ============
        socket.on('playerJoined', (data) => {
            updatePlayersList(data.players);
            const myPlayer = data.players.find(p => p.id === game.playerId);
            if (myPlayer) updateReadyButton(myPlayer.ready);
        });

        socket.on('playerReadyUpdate', (data) => {
            updatePlayersList(data.players);
            const myPlayer = data.players.find(p => p.id === game.playerId);
            if (myPlayer) updateReadyButton(myPlayer.ready);
        });

        socket.on('newHost', (data) => {
            game.isHost = data.hostId === game.playerId;
            if (game.players) {
                game.players.forEach(p => p.isHost = p.id === data.hostId);
                updatePlayersList(game.players);
            }
            alert(game.isHost ? '你已成为新房主！' : '房主已更换');
        });

        socket.on('playerLeft', (data) => {
            alert(`${data.playerName} 离开了房间`);
        });

        socket.on('gameStarted', (data) => {
            console.log('游戏开始!', data);
            document.getElementById('waiting-section').style.display = 'none';
            document.getElementById('playing-area').style.display = 'block';

            // 保存自己的手牌
            const me = data.players.find(p => p.id === game.playerId);
            game.myHand = me && me.hand ? [...me.hand] : [];

            // 清空公共牌显示
            const communityCards = document.querySelectorAll('#community-cards .card');
            communityCards.forEach(card => {
                card.className = 'card face-down hidden';
                card.innerHTML = '';
            });

            // 显示新对局开始的提示（使用自定义对话框，只有确定按钮）
            const dealerSeat = data.players[data.dealer];
            document.getElementById('new-hand-title').textContent = '🃏 新对局开始！';
            document.getElementById('new-hand-message').innerHTML = `
                庄家: ${dealerSeat.name}<br>
                小盲: ${data.players[(data.dealer + 1) % data.players.length].name}<br>
                大盲: ${data.players[(data.dealer + 2) % data.players.length].name}
            `;
            document.getElementById('new-hand-modal').style.display = 'flex';

            updateGameState(data);
        });

        // 关闭新对局对话框，并刷新下注UI
        function closeNewHandModal() {
            document.getElementById('new-hand-modal').style.display = 'none';
            // 关闭模态框后，重新检查是否该我行动，显示下注UI
            if (window.currentGameData) {
                enableActions(window.currentGameData);
            }
        }

        socket.on('gameUpdate', (data) => {
            console.log('[gameUpdate] dealer:', data.dealer, 'phase:', data.phase, 'currentPlayer:', data.currentPlayer);
            updateGameState(data);
        });

        socket.on('playerAction', (data) => {
            console.log('玩家动作:', data);
        });

        socket.on('gameEnd', (data) => {
            console.log('游戏结束:', data);

            // 显示所有玩家的手牌和牌型
            let message = `🃏 游戏结束！\n\n`;

            if (data.handName === '对手弃牌') {
                const winner = data.players.find(p => !p.folded);
                message += `🏆 ${winner.name} 获胜！（对手弃牌）\n`;
                message += `💰 赢得 ${data.pot.toLocaleString()} 筹码\n`;
            } else {
                data.results.forEach(r => {
                    const player = data.players.find(p => p.id === r.playerId);
                    const isWinner = data.winners.includes(r.playerId);
                    message += `${isWinner ? '🏆' : '  '} ${player.name}: ${r.handName}\n`;
                });
                message += `\n💰 奖池: ${data.pot.toLocaleString()} 筹码\n`;
            }

            // 更新游戏状态（包括 dealer 位置，用于显示 SB/BB/D 标识）
            game.dealer = data.dealer;
            game.players = data.players;
            updateGameState(data);

            alert(message);
        });

        function updateGameState(data) {
            // 保留自己的手牌（服务器发送的 gameUpdate 中没有 hand 字段）
            if (game.myHand && game.myHand.length > 0) {
                const me = data.players.find(p => p.id === game.playerId);
                if (me) me.hand = game.myHand;
            }

            game.players = data.players;
            game.currentPlayer = data.currentPlayer;
            game.phase = data.phase;
            game.dealer = data.dealer;

            console.log('[updateGameState] dealer:', data.dealer, 'dealerIdx will be:', data.dealer, 'phase:', data.phase);

            document.getElementById('pot-amount').textContent = data.pot.toLocaleString();

            // 计算 SB/BB 位置
            const playerCount = data.players.length;
            const dealerIdx = data.dealer;
            const sbIdx = (dealerIdx + 1) % playerCount;
            const bbIdx = (dealerIdx + 2) % playerCount;

            // 环形排列：把玩家分成上下两排
            // 假设最多8人，上排4人，下排4人
            const topRow = [];
            const bottomRow = [];

            if (playerCount <= 4) {
                // 4人或以下：全部在上排
                for (let i = 0; i < playerCount; i++) {
                    topRow.push(i);
                }
            } else {
                // 5-8人：平分上下排
                const half = Math.ceil(playerCount / 2);
                for (let i = 0; i < playerCount; i++) {
                    if (i < half) {
                        topRow.push(i);
                    } else {
                        bottomRow.push(i);
                    }
                }
            }

            // 渲染座位
            function renderSeat(player, index, posType) {
                const isMe = player.id === game.playerId;
                const isActive = index === data.currentPlayer && game.phase !== 'waiting' && game.phase !== 'showdown';
                const isDealer = index === dealerIdx;
                const isSB = index === sbIdx;
                const isBB = index === bbIdx;
                const isFolded = player.folded;

                let positionBadges = '';
                if (isDealer) positionBadges += '<div class="position-badge dealer">D</div>';
                if (isSB) positionBadges += '<div class="position-badge sb">SB</div>';
                if (isBB) positionBadges += '<div class="position-badge bb">BB</div>';

                let cardsHtml = '';
                if (player.hand && player.hand.length > 0) {
                    // 手牌只显示给自己的，其他人显示背面
                    if (isMe || game.phase === 'showdown') {
                        cardsHtml = player.hand.map(c => `
                            <div class="card ${c.suit === '♥' || c.suit === '♦' ? 'red' : 'black'}">
                                <div class="card-corner top">${c.rank}<br><span class="card-suit">${c.suit}</span></div>
                                <div class="card-center card-suit">${c.suit}</div>
                                <div class="card-corner bottom">${c.rank}<br><span class="card-suit">${c.suit}</span></div>
                            </div>
                        `).join('');
                    } else {
                        cardsHtml = '<div class="card face-down"></div><div class="card face-down"></div>';
                    }
                } else {
                    cardsHtml = '<div class="card face-down"></div><div class="card face-down"></div>';
                }

                let seatClass = 'seat';
                if (isActive) seatClass += ' active-turn';
                if (isFolded) seatClass += ' folded';

                return `
                    <div class="${seatClass}" data-index="${index}">
                        ${positionBadges}
                        <div class="seat-name">${player.name}${isMe ? ' (你)' : ''}</div>
                        <div class="seat-cards">${cardsHtml}</div>
                        <div class="seat-chips">${player.chips.toLocaleString()}</div>
                    </div>
                `;
            }

            // 渲染上排
            const topEl = document.getElementById('seats-top');
            if (topRow.length === 0) {
                topEl.innerHTML = '';
            } else if (playerCount <= 4) {
                // 2-4人：横向排列
                topEl.innerHTML = topRow.map(idx => renderSeat(data.players[idx], idx, 'top')).join('');
                topEl.style.justifyContent = playerCount === 2 ? 'center' : 'center';
                topEl.style.gap = playerCount === 2 ? '80px' : '30px';
            } else {
                // 5-8人：左右散开，中间留空给公共牌
                const leftSide = topRow.slice(0, Math.ceil(topRow.length / 2));
                const rightSide = topRow.slice(Math.ceil(topRow.length / 2));
                topEl.innerHTML = '<div style="display:flex;gap:30px;">' +
                    leftSide.map(idx => renderSeat(data.players[idx], idx, 'top')).join('') +
                    '<div style="width:120px"></div>' +
                    rightSide.map(idx => renderSeat(data.players[idx], idx, 'top')).join('') +
                    '</div>';
            }

            // 渲染下排
            const bottomEl = document.getElementById('seats-bottom');
            if (bottomRow.length === 0) {
                bottomEl.innerHTML = '';
            } else {
                // 下排：从左到右排列
                bottomEl.innerHTML = bottomRow.map(idx => renderSeat(data.players[idx], idx, 'bottom')).join('');
                bottomEl.style.justifyContent = 'center';
                bottomEl.style.gap = '30px';
            }

            // 更新我的筹码
            const myPlayer = data.players.find(p => p.id === game.playerId);
            if (myPlayer) {
                game.myChips = myPlayer.chips;
                document.getElementById('player-balance').textContent = myPlayer.chips.toLocaleString();
            }

            // 更新公共牌
            const communityCards = document.querySelectorAll('#community-cards .card');
            communityCards.forEach((card, i) => {
                if (i < data.communityCards.length) {
                    const c = data.communityCards[i];
                    card.className = `card ${c.suit === '♥' || c.suit === '♦' ? 'red' : 'black'} dealing`;
                    card.innerHTML = `
                        <div class="card-corner top">${c.rank}<br><span class="card-suit">${c.suit}</span></div>
                        <div class="card-center card-suit">${c.suit}</div>
                        <div class="card-corner bottom">${c.rank}<br><span class="card-suit">${c.suit}</span></div>
                    `;
                    card.classList.remove('hidden');
                } else {
                    card.className = 'card face-down hidden';
                    card.innerHTML = '';
                }
            });

            document.getElementById('game-status').textContent = getPhaseName(data.phase);
            window.currentGameData = data;

            enableActions(data);
        }

        function enableActions(data) {
            const myPlayerIndex = game.players.findIndex(p => p.id === game.playerId);
            const isMyTurn = myPlayerIndex === game.currentPlayer;
            const player = game.players[myPlayerIndex];

            // 详细日志：每轮下注都打印是谁的回合
            const currentPlayerName = game.players[game.currentPlayer]
                ? game.players[game.currentPlayer].name
                : '未知';
            console.log(
                `%c[下注轮转] 当前: ${currentPlayerName} | ` +
                `我的索引: ${myPlayerIndex} | 当前下注索引: ${game.currentPlayer} | ` +
                `是否轮到我: ${isMyTurn} | 阶段: ${game.phase}`,
                'color: #ffd700; font-weight: bold;'
            );

            const actionsDiv = document.getElementById('action-area');
            const callBtn = document.getElementById('call-btn');
            const checkBtn = document.getElementById('check-btn');
            const betBtn = document.getElementById('bet-btn');
            const raiseBtn = document.getElementById('raise-btn');
            const betInput = document.getElementById('bet-amount');

            callBtn.style.display = 'none';
            checkBtn.style.display = 'none';
            betBtn.style.display = 'none';
            raiseBtn.style.display = 'none';
            actionsDiv.style.display = 'none';

            if (!isMyTurn || player.folded || player.allIn || game.phase === 'waiting') {
                return;
            }

            actionsDiv.style.display = 'flex';

            const toCall = data.currentBet - player.currentBet;
            document.getElementById('current-bet').textContent = player.currentBet;
            document.getElementById('to-call').textContent = toCall;

            if (toCall <= 0) {
                checkBtn.style.display = 'block';
                betBtn.style.display = 'block';
                raiseBtn.style.display = 'block';
            } else {
                callBtn.style.display = 'block';
                callBtn.textContent = toCall >= game.myChips ? '全下' : `跟注 ${toCall}`;
                if (game.myChips > toCall) {
                    raiseBtn.style.display = 'block';
                    betBtn.style.display = 'block';
                }
            }
        }

        function getPhaseName(phase) {
            const names = {
                'waiting': '等待开始',
                'preflop': '翻牌前',
                'flop': '翻牌圈',
                'turn': '转牌圈',
                'river': '河牌圈',
                'showdown': '摊牌'
            };
            return names[phase] || phase;
        }
    </script>
</body>
